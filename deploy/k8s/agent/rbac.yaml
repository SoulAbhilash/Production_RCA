apiVersion: v1
kind: ServiceAccount
metadata:
  name: rca-agent
  namespace: poc
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rca-agent-read
  namespace: poc
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rca-agent-read
  namespace: poc
subjects:
  - kind: ServiceAccount
    name: rca-agent
    namespace: poc
roleRef:
  kind: Role
  name: rca-agent-read
  apiGroup: rbac.authorization.k8s.io
