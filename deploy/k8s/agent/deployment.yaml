apiVersion: apps/v1
kind: Deployment
metadata:
  name: rca-agent
  namespace: poc
  labels:
    app.kubernetes.io/name: rca-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rca-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rca-agent
    spec:
      serviceAccountName: rca-agent
      securityContext:
        runAsNonRoot: true
        runAsUser: 10002
        fsGroup: 10002
      containers:
        - name: agent
          image: 523368007337.dkr.ecr.us-east-1.amazonaws.com/rca-agent:7be312e17e0297be9f63df8d1fd39d777c80cb88
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: LOG_LEVEL
              value: INFO
            # Secret is not in git. GitHub Actions (deploy-eks.yml) syncs rca-agent-secrets from repo secret GEMINI_API_KEY.
            # Local / bootstrap without CI:
            #   kubectl create secret generic rca-agent-secrets \
            #     --from-literal=gemini-api-key='YOUR_NEW_KEY' -n poc
            # key below must match the literal name after --from-literal=
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rca-agent-secrets
                  key: gemini-api-key
            - name: GEMINI_MODEL
              value: "gemini-2.0-flash"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "500m"
              memory: 512Mi
