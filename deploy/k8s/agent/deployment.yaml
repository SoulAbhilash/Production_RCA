apiVersion: apps/v1
kind: Deployment
metadata:
  name: rca-agent
  namespace: poc
  labels:
    app.kubernetes.io/name: rca-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rca-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rca-agent
    spec:
      serviceAccountName: rca-agent
      securityContext:
        runAsNonRoot: true
        runAsUser: 10002
        fsGroup: 10002
      containers:
        - name: agent
          image: CHANGEME_ECR/rca-agent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: LOG_LEVEL
              value: INFO
            # Optional: mount from Secret in real deployments
            # - name: OPENAI_API_KEY
            #   valueFrom:
            #     secretKeyRef:
            #       name: rca-agent-secrets
            #       key: OPENAI_API_KEY
            # OpenAI-compatible gateway (AISH-style); takes precedence over OPENAI_API_KEY when all set
            - name: AISH_LLM_API_URL
              value: "https://aishapi.ion.nokia.net/v1"
            - name: AISH_LLMGTW_KEY
              valueFrom:
                secretKeyRef:
                  name: rca-agent-secrets
                  key: oxLxGA5DG1I2yJK68m06SCe4CLrgkwyQT36aZESvMmxduq08JzGV5VPqEDqcpCJndCpvbGwimCuI3oiDRp2jfB50oJYsTRPiBfcbCkPYY2D5HEQzeWvsK92FCN86q3pM
            - name: AISH_LLM_MODEL
              value: "/mnt/model/gpt-oss-120b"
            - name: LLM_TLS_CA_BUNDLE
              value: "/etc/ssl/corp/ca.pem"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "500m"
              memory: 512Mi
