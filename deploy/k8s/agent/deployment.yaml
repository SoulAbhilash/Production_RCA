apiVersion: apps/v1
kind: Deployment
metadata:
  name: rca-agent
  namespace: poc
  labels:
    app.kubernetes.io/name: rca-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rca-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rca-agent
    spec:
      serviceAccountName: rca-agent
      securityContext:
        runAsNonRoot: true
        runAsUser: 10002
        fsGroup: 10002
      containers:
        - name: agent
          image: CHANGEME_ECR/rca-agent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: LOG_LEVEL
              value: INFO
            # Create Secret: kubectl create secret generic rca-agent-secrets --from-literal=gemini-api-key=YOUR_KEY -n poc
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rca-agent-secrets
                  key: AIzaSyAM_kAUfUn0lz4WFiCQ0-qKNCkBr8fut2w
            - name: GEMINI_MODEL
              value: "gemini-2.0-flash"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "500m"
              memory: 512Mi
