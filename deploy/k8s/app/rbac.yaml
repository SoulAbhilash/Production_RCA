apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-app
  namespace: poc
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: demo-app-readonly
  namespace: poc
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: demo-app-readonly
  namespace: poc
subjects:
  - kind: ServiceAccount
    name: demo-app
    namespace: poc
roleRef:
  kind: Role
  name: demo-app-readonly
  apiGroup: rbac.authorization.k8s.io
