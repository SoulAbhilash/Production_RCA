# Manual deploy — set Actions secrets: KUBECONFIG_B64, ECR_REGISTRY (account.dkr.ecr.region.amazonaws.com).
name: Deploy EKS (manual)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
        with:
          version: "v1.29.0"
      - name: Deploy manifests
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          test -n "${KUBECONFIG_B64:-}" || (echo "Set KUBECONFIG_B64 repository secret" && exit 1)
          test -n "${ECR_REGISTRY:-}" || (echo "Set ECR_REGISTRY repository secret (e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com)" && exit 1)
          mkdir -p ~/.kube
          echo "$KUBECONFIG_B64" | base64 -d > ~/.kube/config
          kubectl apply -f deploy/k8s/app/namespace.yaml
          kubectl apply -f deploy/k8s/app/rbac.yaml
          kubectl apply -f deploy/k8s/app/configmap.yaml
          kubectl -n poc get secret demo-app-db >/dev/null 2>&1 || (echo "Create secret demo-app-db first" && exit 1)
          sed "s|CHANGEME_ECR/demo-app:latest|${ECR_REGISTRY}/demo-app:${TAG}|" deploy/k8s/app/deployment.yaml | kubectl apply -f -
          kubectl apply -f deploy/k8s/app/service.yaml
          kubectl apply -f deploy/k8s/agent/rbac.yaml
          sed "s|CHANGEME_ECR/rca-agent:latest|${ECR_REGISTRY}/rca-agent:${TAG}|" deploy/k8s/agent/deployment.yaml | kubectl apply -f -
          kubectl apply -f deploy/k8s/agent/service.yaml
