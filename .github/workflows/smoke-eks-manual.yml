# Manual smoke test — requires KUBECONFIG_B64 (same as deploy).
name: Smoke EKS (manual)

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: azure/setup-kubectl@v4
        with:
          version: "v1.29.0"
      - name: In-cluster health check
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          set -euo pipefail
          test -n "${KUBECONFIG_B64:-}" || (echo "Set KUBECONFIG_B64 repository secret" && exit 1)
          mkdir -p ~/.kube
          echo "$KUBECONFIG_B64" | base64 -d > ~/.kube/config
          kubectl -n poc run smoke-curl --rm -i --restart=Never --image=curlimages/curl:8.5.0 --command -- curl -sfS "http://demo-app.poc.svc.cluster.local/health"
