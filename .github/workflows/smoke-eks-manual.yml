# Manual smoke — same OIDC role as build/deploy (needs EKS access entry on the cluster).
name: Smoke EKS (manual)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
    steps:
      - uses: azure/setup-kubectl@v4
        with:
          version: "v1.29.0"

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: In-cluster health check
        env:
          EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
        run: |
          set -euo pipefail
          CLUSTER="${EKS_CLUSTER_NAME:-rca-poc-eks}"
          aws eks update-kubeconfig --region "${AWS_REGION}" --name "${CLUSTER}"
          kubectl -n poc run smoke-curl --rm -i --restart=Never --image=curlimages/curl:8.5.0 --command -- curl -sfS "http://demo-app.poc.svc.cluster.local/health"
